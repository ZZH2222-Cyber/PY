name: CI

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip list
    
    - name: Run tests with retry
      run: |
        # 增加重试机制，处理网络问题
        for i in {1..3}; do
          echo "第 $i 次运行测试..."
          python run_tests.py && break
          if [ $i -eq 3 ]; then
            echo "测试失败，已达到最大重试次数"
            exit 1
          fi
          echo "测试失败，3秒后重试..."
          sleep 3
        done
    
    - name: Generate Allure report
      run: |
        python -m pytest src/tests --alluredir=./allure-results
    
    - name: Upload Allure report
      uses: actions/upload-artifact@v3
      with:
        name: allure-report
        path: ./allure-results
        retention-days: 7
